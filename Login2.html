<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Authentication Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --gradient-start: #FF416C;
            --gradient-end: #FF4B2B;
            --bg-light: #f6f5f7;
            --input-bg: #edf2f7;
            --text-dark: #333333;
            --text-muted: #7f8c8d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* Container Main Layout */
        .container {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 14px 28px rgba(0,0,0,0.1), 0 10px 10px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            width: 768px;
            max-width: 100%;
            min-height: 520px;
            transition: all 0.6s ease-in-out;
        }

        /* Form Layouts */
        .form-container {
            position: absolute;
            top: 0;
            height: 100%;
            transition: all 0.6s ease-in-out;
        }

        .sign-in-container {
            left: 0;
            width: 50%;
            z-index: 2;
        }

        .sign-up-container {
            left: 0;
            width: 50%;
            opacity: 0;
            z-index: 1;
        }

        form {
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 40px;
            height: 100%;
            text-align: center;
        }

        h1 {
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-dark);
            font-size: 2rem;
        }

        span {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        /* Input Styling */
        input {
            background-color: var(--input-bg);
            border: none;
            padding: 12px 15px;
            margin: 8px 0;
            width: 100%;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            background-color: #e2e8f0;
            box-shadow: inset 0 0 0 2px rgba(255, 65, 108, 0.2);
        }

        a {
            color: var(--text-dark);
            font-size: 13px;
            text-decoration: none;
            margin: 15px 0;
            transition: color 0.2s;
        }

        a:hover {
            color: var(--gradient-end);
        }

        /* Button Styling */
        button {
            border-radius: 25px;
            border: 1px solid transparent;
            background: linear-gradient(to right, var(--gradient-start), var(--gradient-end));
            color: #ffffff;
            font-size: 12px;
            font-weight: bold;
            padding: 12px 45px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 80ms ease-in, box-shadow 0.2s ease;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(255, 75, 43, 0.3);
        }

        button:active {
            transform: scale(0.95);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 75, 43, 0.4);
        }

        button.ghost {
            background: transparent;
            border-color: #ffffff;
            box-shadow: none;
        }
        
        button.ghost:hover {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: none;
        }

        /* Social Container */
        .social-container {
            margin: 10px 0 20px 0;
        }

        .social-container a {
            border: 1px solid #ddd;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin: 0 5px;
            height: 40px;
            width: 40px;
            transition: all 0.3s ease;
            color: var(--text-dark);
        }

        .social-container a:hover {
            background-color: var(--input-bg);
            transform: translateY(-2px);
        }

        /* Overlay Layout */
        .overlay-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            overflow: hidden;
            transition: transform 0.6s ease-in-out;
            z-index: 100;
            box-shadow: -10px 0 25px rgba(0, 0, 0, 0.15);
        }

        .overlay {
            background: linear-gradient(to right, var(--gradient-start), var(--gradient-end));
            color: #ffffff;
            position: relative;
            left: -100%;
            height: 100%;
            width: 200%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }

        .overlay-panel {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 40px;
            text-align: center;
            top: 0;
            height: 100%;
            width: 50%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }

        .overlay-left {
            transform: translateX(-20%);
        }

        .overlay-right {
            right: 0;
            transform: translateX(0);
        }

        .overlay-panel p {
            font-size: 14px;
            font-weight: 300;
            line-height: 20px;
            letter-spacing: 0.5px;
            margin: 20px 0 30px;
            opacity: 0.9;
        }

        /* Core Animation States (Triggered via JS class toggle) */
        .container.right-panel-active .sign-in-container {
            transform: translateX(100%);
            opacity: 0;
            z-index: 1;
        }

        .container.right-panel-active .sign-up-container {
            transform: translateX(100%);
            opacity: 1;
            z-index: 5;
            animation: show 0.6s;
        }

        .container.right-panel-active .overlay-container {
            transform: translateX(-100%);
            box-shadow: 10px 0 25px rgba(0, 0, 0, 0.15);
        }

        .container.right-panel-active .overlay {
            transform: translateX(50%);
        }

        .container.right-panel-active .overlay-left {
            transform: translateX(0);
        }

        .container.right-panel-active .overlay-right {
            transform: translateX(20%);
        }

        @keyframes show {
            0%, 49.99% {
                opacity: 0;
                z-index: 1;
            }
            50%, 100% {
                opacity: 1;
                z-index: 5;
            }
        }

        /* Portfolio Attribution Badge */
        /* Portfolio Attribution Badge - Draggable Version */
.portfolio-badge {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: #ffffff;
    padding: 10px 16px;
    border-radius: 30px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dark);
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 1000;
    border: 1px solid rgba(0, 0, 0, 0.05);
    cursor: move; /* Changes cursor to a crosshair indicator */
    user-select: none; /* Prevents text highlighting while dragging */
    transition: box-shadow 0.3s ease; /* Removed transform transition to avoid drag lag */
}

.portfolio-badge a {
    color: var(--gradient-end);
    font-weight: 600;
    margin: 0;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    position: relative;
    cursor: pointer; /* Keeps standard pointer for the actual link */
}

.portfolio-badge a::after {
    content: '';
    position: absolute;
    width: 100%;
    transform: scaleX(0);
    height: 1.5px;
    bottom: -2px;
    left: 0;
    background-color: var(--gradient-end);
    transform-origin: bottom right;
    transition: transform 0.25s ease-out;
}

.portfolio-badge a:hover::after {
    transform: scaleX(1);
    transform-origin: bottom left;
}

.portfolio-badge:hover {
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
}


        /* Responsive Breakpoint for Mobile Devices */
        /* --- MOBILE PAR BHI LAPTOP VIEW DIKHANE KE LIYE CSS --- */
@media (max-width: 768px) {
    body {
        overflow: hidden; /* Scroll khatam taake desktop feel aaye */
        padding: 10px;
        height: 100vh;
    }

    /* Container ko mobile screen ke mutabiq scale (chota) karein gey */
    .container {
        display: block !important;
        width: 768px; /* Laptop width freeze kar di */
        max-width: none; 
        min-height: 520px;
        /* Yeh property screen size ke mutabiq pooray card ko automatic chota kar degi */
        transform: scale(0.45); 
        transform-origin: center center;
    }

    /* Overlay panels mobile par gayab nahi hon gey, bilkul laptop tarah kaam karein gey */
    .overlay-container {
        display: block !important;
    }

    .sign-up-container {
        display: block !important;
    }

    /* Draggable badge ko mobile par scale ke mutabiq thora adjust karne ke liye */
    .portfolio-badge {
        font-size: 11px;
        padding: 8px 12px;
        bottom: 10px;
        right: 10px;
    }
}

/* Bohat choti screens (like iPhone SE) ke liye mazeed thora chota scaling */
@media (max-width: 380px) {
    .container {
        transform: scale(0.38);
    }
}

    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="form-container sign-up-container">
            <form action="#">
                <h1>Create Account</h1>
                <div class="social-container">
                    <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social"><i class="fab fa-google-plus-g"></i></a>
                    <a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
                </div>
                <span>or use your email for registration</span>
                <input type="text" placeholder="Name" required />
                <input type="email" placeholder="Email" required />
                <input type="password" placeholder="Password" required />
                <button type="submit">Sign Up</button>
            </form>
        </div>

        <div class="form-container sign-in-container">
            <form action="#">
                <h1>Sign In</h1>
                <div class="social-container">
                    <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social"><i class="fab fa-google-plus-g"></i></a>
                    <a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
                </div>
                <span>or use your account</span>
                <input type="email" placeholder="Email" required />
                <input type="password" placeholder="Password" required />
                <a href="#">Forgot your password?</a>
                <button type="submit">Sign In</button>
            </form>
        </div>

        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Welcome Back!</h1>
                    <p>To keep connected with us please login with your personal info</p>
                    <button class="ghost" id="signIn">Sign In</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Hello, Friend!</h1>
                    <p>Enter your personal details and start your journey with us</p>
                    <button class="ghost" id="signUp">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="portfolio-badge">
        <span>Made by <strong>Aaliyan Ahmed</strong></span>
        <a href="https://aaliyan.is-a.dev" target="_blank" rel="noopener noreferrer">
            Visit Website <i class="fas fa-external-link-alt"></i>
        </a>
    </footer>

    <script>
      // --- DRAG & TOUCH LOGIC FOR PORTFOLIO BADGE ---
const badge = document.querySelector('.portfolio-badge');
let isDragging = false;
let offsetX, offsetY;

// Function to handle the start of a drag/touch
function startDrag(clientX, clientY, target) {
    // Prevent dragging if clicking directly on the hyperlink text
    if (target.closest('a')) return;

    isDragging = true;
    
    const rect = badge.getBoundingClientRect();
    offsetX = clientX - rect.left;
    offsetY = clientY - rect.top;

    // Strip bottom/right positioning to prevent layout conflicts
    badge.style.bottom = 'auto';
    badge.style.right = 'auto';
    
    badge.style.opacity = '0.8'; // Visual feedback
}

// Function to handle the movement
function moveDrag(clientX, clientY, event) {
    if (!isDragging) return;

    // Prevent screen scrolling on mobile while dragging the badge
    if (event.cancelable) event.preventDefault();

    let leftPosition = clientX - offsetX;
    let topPosition = clientY - offsetY;

    // Boundary restrictions (keeps badge inside viewport window)
    const maxX = window.innerWidth - badge.offsetWidth;
    const maxY = window.innerHeight - badge.offsetHeight;

    leftPosition = Math.max(0, Math.min(leftPosition, maxX));
    topPosition = Math.max(0, Math.min(topPosition, maxY));

    badge.style.left = `${leftPosition}px`;
    badge.style.top = `${topPosition}px`;
}

// Function to stop the drag
function stopDrag() {
    if (isDragging) {
        isDragging = false;
        badge.style.opacity = '1';
    }
}

// --- MOUSE EVENTS ---
badge.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY, e.target));
document.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY, e));
document.addEventListener('mouseup', stopDrag);

// --- TOUCH EVENTS (MOBILE & TABLET) ---
badge.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    startDrag(touch.clientX, touch.clientY, e.target);
}, { passive: false });

document.addEventListener('touchmove', (e) => {
    const touch = e.touches[0];
    moveDrag(touch.clientX, touch.clientY, e);
}, { passive: false }); // 'passive: false' allows us to stop the mobile screen from shaking/scrolling during drag

document.addEventListener('touchend', stopDrag);

        document.addEventListener('DOMContentLoaded', () => {
            const signUpButton = document.getElementById('signUp');
            const signInButton = document.getElementById('signIn');
            const container = document.getElementById('container');

            // Slide right to show Sign Up Form
            signUpButton.addEventListener('click', () => {
                container.classList.add("right-panel-active");
            });

            // Slide left to show Sign In Form
            signInButton.addEventListener('click', () => {
                container.classList.remove("right-panel-active");
            });
        });
    </script>
</body>
</html>
